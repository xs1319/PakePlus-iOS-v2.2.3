<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
  <title>沉井综合单价计算器</title>
  <style>
    * { box-sizing: border-box; margin: 0; font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif; }
    body { background: #f5f9fe; padding: 0; color: #1e2f3e; min-height: 100vh; width: 100%; overflow-x: hidden; position: relative; }
    .app-wrapper { width: 100%; max-width: 100%; margin: 0 auto; background: #ffffff; min-height: 100vh; position: relative; overflow-x: hidden; }
    .header { padding: 20px 20px 8px; display: flex; align-items: center; justify-content: space-between; background: #ffffff; position: sticky; top: 0; z-index: 5; width: 100%; border-bottom: 1px solid #e9edf4; }
    h1 { font-weight: 500; font-size: 1.8rem; letter-spacing: 1px; color: #0f3b5e; margin: 0; }
    .settings-icon { font-size: 28px; background: #eef3fa; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 40px; cursor: pointer; transition: 0.2s; color: #1e5780; border: 1px solid #cbdae6; }
    .input-section { padding: 8px 16px 20px; width: 100%; }
    .card { background: #ffffff; border-radius: 24px; padding: 18px 18px; margin-bottom: 18px; box-shadow: 0 6px 16px rgba(0,0,0,0.03); border: 1px solid #e3eaf2; width: 100%; overflow: hidden; }
    .card h2 { font-weight: 500; font-size: 1.3rem; margin: 0 0 16px 0; color: #1e4460; display: flex; align-items: center; gap: 8px; border-bottom: 1.5px dashed #b8cee2; padding-bottom: 10px; }
    .param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 12px; width: 100%; }
    .input-item { display: flex; flex-direction: column; min-width: 0; }
    .input-item label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #527a9b; margin-bottom: 4px; letter-spacing: 0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .input-item input { background: #fafcff; border: 1.5px solid #d3dfec; border-radius: 18px; padding: 12px 14px; font-size: 0.95rem; font-weight: 500; color: #0b2a41; outline: none; transition: all 0.15s; width: 100%; min-width: 0; }
    .input-item input:focus { border-color: #2a7faa; box-shadow: 0 0 0 3px rgba(42,127,170,0.1); background: #ffffff; }
    .input-item input:disabled { background: #eef2f7; color: #6b8aa8; border-color: #ccdae8; }
    .readonly-highlight input:disabled { background: #e0ecf5; color: #13415c; font-weight: 600; }
    .result-section { background: #f0f5fb; border-radius: 32px 32px 0 0; padding: 20px 18px 30px; margin-top: 8px; width: 100%; }
    .stats-badge { background: #d9e6f2; border-radius: 30px; padding: 8px 20px; display: inline-block; font-weight: 600; margin-bottom: 16px; }
    .quantity-flex { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .q-item { background: white; border-radius: 40px; padding: 10px 20px; flex: 1 0 calc(50% - 10px); box-shadow: 0 4px 8px rgba(0,0,0,0.02); border: 1px solid #d2e0ee; display: flex; justify-content: space-between; }
    .btn-calc { background: #1a5f8d; color: white; border: none; border-radius: 60px; padding: 18px 20px; font-size: 1.3rem; font-weight: 600; width: 100%; margin: 12px 0 10px; cursor: pointer; box-shadow: 0 6px 14px rgba(26,86,129,0.2); }
    .settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f9fe; z-index: 999; transform: translateX(100%); transition: transform 0.3s ease-in-out; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    .settings-overlay.active { transform: translateX(0); }
    .settings-header { display: flex; align-items: center; gap: 16px; padding: 8px 0 20px; background: #f5f9fe; }
    .back-btn { background: #e4ecf5; border: none; font-size: 32px; width: 48px; height: 48px; border-radius: 30px; cursor: pointer; }
    .price-total-line { font-size: 1.2rem; margin-top: 16px; }
    .green-bold { color: #1e7e34; font-weight: 700; }
    .blue-bold { color: #1a5f8d; font-weight: 700; }
    .red-large { color: #b22222; font-weight: 800; font-size: 1.5rem; }
    .record-item { background: white; border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid #d9e2ec; cursor: pointer; position: relative; }
    .record-header { display: flex; align-items: center; gap: 8px; }
    .record-index { background: #1e5780; color: white; width: 26px; height: 26px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.8rem; }
    .record-title { flex:1; font-weight: 600; display: flex; justify-content: space-between; }
    .menu-dots { padding: 4px 8px; border-radius: 20px; background: #eaf0f8; }
    .record-menu { position: absolute; right: 16px; top: 48px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 8px 0; z-index: 10; display: none; border: 1px solid #cfdbe8; }
    .record-menu.show { display: block; }
    .menu-item { padding: 12px 24px; cursor: pointer; white-space: nowrap; }
    .menu-item:hover { background: #f0f6ff; }
    .record-detail { margin-top: 16px; padding-top: 16px; border-top: 1.5px dashed #b0c8dd; font-size: 0.85rem; background: #f6faff; border-radius: 18px; padding: 16px; max-height: 500px; overflow-y: auto; }
    .detail-section { margin-bottom: 16px; background: white; border-radius: 18px; padding: 12px; }
    .detail-section h4 { font-size: 0.95rem; margin: 0 0 10px 0; color: #1e4460; border-left: 4px solid #2a7faa; padding-left: 12px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
    .detail-item { display: flex; justify-content: space-between; border-bottom: 1px dotted #cbdae6; padding: 4px 0; }
    .hidden { display: none; }
    .small-note { color: #6b8aa8; margin-top: 6px; font-size: 0.75rem; }
    .sub-card { background: #fbfdff; border-radius: 20px; padding: 14px 16px; margin-bottom: 16px; border: 1px solid #e6edf6; }
    .sub-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-weight: 600; color: #1e4460; font-size: 1.05rem; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="header">
    <h1>沉井综合单价计算器</h1>
    <div class="settings-icon" id="openSettingsBtn">⚙️</div>
  </div>

  <div class="input-section">
    <div class="card">
      <h2>📋 基础信息</h2>
      <div class="param-grid">
        <div class="input-item"><label>沉井内径 (m)</label><input id="D" type="number" step="0.01" value="6.00"></div>
        <div class="input-item"><label>流水面总高度 (m)</label><input id="totalFlowH" type="number" step="0.01" value="6.80"></div>
        <div class="input-item"><label>砖砌体高度 (m)</label><input id="H3" type="number" step="0.01" value="0.80"></div>
        <div class="input-item readonly-highlight"><label>钢筋砼标准段高度 (m)</label><input id="H2" type="number" readonly disabled></div>
      </div>
      <div class="small-note">流水面总高 = 标准段高度 + 砖砌体高度</div>
    </div>
    <div class="card">
      <h2>📐 工艺尺寸</h2>
      <div class="param-grid">
        <div class="input-item"><label>刃脚高度 (m)</label><input id="H1" type="number" step="0.01" value="1.20"></div>
        <div class="input-item"><label>刃脚壁厚 (m)</label><input id="A1" type="number" step="0.01" value="0.40"></div>
        <div class="input-item"><label>钢筋砼标准段壁厚 (m)</label><input id="A2" type="number" step="0.01" value="0.35"></div>
        <div class="input-item"><label>砖砌体壁厚 (m)</label><input id="A3" type="number" step="0.01" value="0.24"></div>
        <div class="input-item"><label>圈梁高度 (m)</label><input id="H4" type="number" step="0.01" value="0.30"></div>
        <div class="input-item"><label>圈梁壁厚 (m)</label><input id="A4" type="number" step="0.01" value="0.30"></div>
        <div class="input-item"><label>底板厚度 (m)</label><input id="B" type="number" step="0.01" value="0.30"></div>
        <div class="input-item"><label>封底厚度 (m)</label><input id="sealThick" type="number" step="0.01" value="1.00"></div>
      </div>
    </div>

    <div class="card">
      <h2>🔧 钢筋型号尺寸</h2>
      
      <div class="sub-card" id="bladeRebarCard">
        <div class="sub-card-header"><span>🔩 刃脚钢筋</span></div>
        <div class="sub-card-content">
          <div class="param-grid">
            <div class="input-item"><label>内侧水平筋直径 (mm)</label><input id="φ1" value="12"></div><div class="input-item"><label>内侧水平筋间距 (mm)</label><input id="L1" value="150"></div>
            <div class="input-item"><label>外侧水平筋直径 (mm)</label><input id="φ2" value="12"></div><div class="input-item"><label>外侧水平筋间距 (mm)</label><input id="L2" value="150"></div>
            <div class="input-item"><label>内侧站筋直径 (mm)</label><input id="φ3" value="16"></div><div class="input-item"><label>内侧站筋间距 (mm)</label><input id="L3" value="200"></div>
            <div class="input-item"><label>外侧站筋直径 (mm)</label><input id="φ4" value="16"></div><div class="input-item"><label>外侧站筋间距 (mm)</label><input id="L4" value="200"></div>
          </div>
        </div>
      </div>

      <div id="standardLayersContainer"></div>

      <div class="sub-card" id="bottomRebarCard">
        <div class="sub-card-header"><span>🕸 底板 & 圈梁钢筋</span></div>
        <div class="sub-card-content">
          <div class="param-grid">
            <div class="input-item"><label>上层水平筋直径 (mm)</label><input id="φ17" value="12"></div><div class="input-item"><label>上层水平筋间距 (mm)</label><input id="L17" value="150"></div>
            <div class="input-item"><label>上层纵筋直径 (mm)</label><input id="φ18" value="12"></div><div class="input-item"><label>上层纵筋间距 (mm)</label><input id="L18" value="150"></div>
            <div class="input-item"><label>下层水平筋直径 (mm)</label><input id="φ19" value="12"></div><div class="input-item"><label>下层水平筋间距 (mm)</label><input id="L19" value="150"></div>
            <div class="input-item"><label>下层纵筋直径 (mm)</label><input id="φ20" value="12"></div><div class="input-item"><label>下层纵筋间距 (mm)</label><input id="L20" value="150"></div>
            <div class="input-item"><label>圈梁钢筋直径 (mm)</label><input id="φ21" value="16"></div><div class="input-item"><label>圈梁钢筋根数</label><input id="C" value="8"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>💰 单价 & 费率</h2>
      <div class="param-grid">
        <div class="input-item"><label>人工·模板 (元/m²)</label><input id="priceLabTemplate" value="65"></div>
        <div class="input-item"><label>人工·钢筋 (元/吨)</label><input id="priceLabRebar" value="1200"></div>
        <div class="input-item"><label>人工·混凝土 (元/m³)</label><input id="priceLabConc" value="45"></div>
        <div class="input-item"><label>人工·砖砌体 (元/块)</label><input id="priceLabMasonry" value="2.8"></div>
        <div class="input-item"><label>材料·钢筋 (元/吨)</label><input id="priceMatRebar" value="4800"></div>
        <div class="input-item"><label>材料·混凝土 (元/m³)</label><input id="priceMatConc" value="520"></div>
        <div class="input-item"><label>材料·砖 (元/块)</label><input id="priceMatBrick" value="1.9"></div>
        <div class="input-item"><label>长臂挖机 (元/m³)</label><input id="priceMachExc" value="28"></div>
        <div class="input-item"><label>土方外运 (元/m³)</label><input id="priceMachTrans" value="65"></div>
        <div class="input-item"><label>管理费率 (%)</label><input id="manageRate" value="5"></div>
        <div class="input-item"><label>利润比率 (%)</label><input id="profitRate" value="12"></div>
        <div class="input-item"><label>税点 (%)</label><input id="taxRate" value="9"></div>
      </div>
    </div>
    <button class="btn-calc" id="calculateBtn">⟳ 计算</button>
  </div>

  <div class="result-section" id="resultPanel">
    <div class="stats-badge">📊 工程量</div>
    <div class="quantity-flex" id="quantityContainer"></div>
    <div id="costDetailContainer"></div>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-header">
    <button class="back-btn" id="closeSettingsBtn">←</button>
    <div class="settings-title">⚙️ 参数与记录</div>
  </div>
  <div id="lockPanel">
    <div class="lock-message" style="background:#fef1e6; padding:14px; border-radius:20px;">🔐 修改需密码 (000000)</div>
    <div style="display:flex; gap:8px; margin:10px 0;">
      <input type="password" id="pwdInput" placeholder="输入密码" style="flex:1; padding:14px; border-radius:30px; border:1px solid #ccc;">
      <button id="unlockBtn" style="padding:0 24px; border-radius:40px; background:#1e5780; color:white; border:none;">解锁</button>
    </div>
  </div>
  <div id="settingsContent">
    <div class="card">
      <h3>🔧 全局参数</h3>
      <div class="param-grid">
        <div class="input-item"><label>钢筋原材长度 (m)</label><input id="barLength" value="9.0" step="0.1" disabled></div>
        <div class="input-item"><label>钢筋损耗率 (%)</label><input id="lossRate" value="1.2" disabled></div>
        <div class="input-item"><label>底板钢筋长度系数</label><input id="kLen" value="0.8862" step="0.0001" disabled></div>
        <div class="input-item"><label>搭接系数 (d倍数)</label><input id="lapFactor" value="35" disabled></div>
        <div class="input-item"><label>保护层厚度 (mm)</label><input id="protect" value="30" disabled></div>
        <div class="input-item"><label>砖长 (m)</label><input id="brickL" value="0.22" disabled></div>
        <div class="input-item"><label>砖宽 (m)</label><input id="brickW" value="0.11" disabled></div>
        <div class="input-item"><label>砖高 (m)</label><input id="brickH" value="0.055" disabled></div>
      </div>
      <button id="applySettingsBtn" style="margin-top:20px; width:100%; padding:16px; border-radius:40px; background:#1a5f8d; color:white; border:none;">应用并返回</button>
    </div>
  </div>
  <div style="margin-top:24px;">
    <h3>📋 计算记录 (点击卡片展开)</h3>
    <div id="historyList" style="margin-top:12px;"></div>
  </div>
</div>

<script>
  (function(){
    // 全局配置
    let config = { 
      barLength: 9.0,
      kLen:0.8862, 
      protect:30, 
      lapFactor:35, 
      brick:[0.22,0.11,0.055], 
      lossRate:1.2 
    };
    let unlocked = false;
    const STORAGE_KEY = 'caisson_records';
    const LAST_INPUT_KEY = 'caisson_last_input';
    let activeMenuId = null;

    const D=()=>parseFloat(document.getElementById('D').value)||0;
    const totalFlowH=()=>parseFloat(document.getElementById('totalFlowH').value)||0;
    const H3=()=>parseFloat(document.getElementById('H3').value)||0;
    const H2_input=document.getElementById('H2');
    
    function syncH2(){ 
      // 严格遵循：流水面总高度 = 标准段高度 + 砖砌体高度
      let h2 = totalFlowH() - H3(); 
      if(h2 < 0) h2 = 0; 
      H2_input.value = h2.toFixed(3); 
      renderStandardLayers(); 
    }
    
    function renderStandardLayers(){
      const H2m = parseFloat(H2_input.value) || 0;
      const maxPer = 7.0;
      const layers = H2m > 0 ? Math.ceil(H2m / maxPer) : 1;
      const perLayer = H2m / layers;
      
      const container = document.getElementById('standardLayersContainer');
      let html = '';
      
      html += `
        <div class="sub-card" id="layer1SubCard">
          <div class="sub-card-header">
            <span>🧱 标准段第一层钢筋 · <span class="layer-height">${perLayer.toFixed(3)}</span>m</span>
          </div>
          <div class="sub-card-content">
            <div class="param-grid">
              <div class="input-item"><label>内侧水平筋直径 (mm)</label><input id="φ5" value="12"></div><div class="input-item"><label>内侧水平筋间距 (mm)</label><input id="L5" value="150"></div>
              <div class="input-item"><label>外侧水平筋直径 (mm)</label><input id="φ6" value="12"></div><div class="input-item"><label>外侧水平筋间距 (mm)</label><input id="L6" value="150"></div>
              <div class="input-item"><label>内侧站筋直径 (mm)</label><input id="φ7" value="14"></div><div class="input-item"><label>内侧站筋间距 (mm)</label><input id="L7" value="200"></div>
              <div class="input-item"><label>外侧站筋直径 (mm)</label><input id="φ8" value="14"></div><div class="input-item"><label>外侧站筋间距 (mm)</label><input id="L8" value="200"></div>
            </div>
          </div>
        </div>
      `;
      
      for (let i = 2; i <= layers; i++) {
        const basePhi = 5 + (i-1)*4;
        html += `
          <div class="sub-card" id="layer${i}SubCard">
            <div class="sub-card-header">
              <span>🧱 标准段第${i}层钢筋 · <span class="layer-height">${perLayer.toFixed(3)}</span>m</span>
            </div>
            <div class="sub-card-content">
              <div class="param-grid">
                <div class="input-item"><label>内侧水平筋直径 (mm)</label><input id="φ${basePhi}" value="12"></div><div class="input-item"><label>内侧水平筋间距 (mm)</label><input id="L${basePhi}" value="150"></div>
                <div class="input-item"><label>外侧水平筋直径 (mm)</label><input id="φ${basePhi+1}" value="12"></div><div class="input-item"><label>外侧水平筋间距 (mm)</label><input id="L${basePhi+1}" value="150"></div>
                <div class="input-item"><label>内侧站筋直径 (mm)</label><input id="φ${basePhi+2}" value="14"></div><div class="input-item"><label>内侧站筋间距 (mm)</label><input id="L${basePhi+2}" value="200"></div>
                <div class="input-item"><label>外侧站筋直径 (mm)</label><input id="φ${basePhi+3}" value="14"></div><div class="input-item"><label>外侧站筋间距 (mm)</label><input id="L${basePhi+3}" value="200"></div>
              </div>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
      return { layers, perLayer };
    }
    
    document.getElementById('totalFlowH').addEventListener('input', syncH2);
    document.getElementById('H3').addEventListener('input', syncH2);

    function captureInputs(){
      const base = {
        D: D(), totalFlowH: totalFlowH(), H3: H3(), H1: parseFloat(document.getElementById('H1').value)||0, A1: parseFloat(document.getElementById('A1').value)||0,
        A2: parseFloat(document.getElementById('A2').value)||0, A3: parseFloat(document.getElementById('A3').value)||0, H4: parseFloat(document.getElementById('H4').value)||0,
        A4: parseFloat(document.getElementById('A4').value)||0, B: parseFloat(document.getElementById('B').value)||0, sealThick: parseFloat(document.getElementById('sealThick').value)||0,
        φ1: document.getElementById('φ1')?.value, L1: document.getElementById('L1')?.value, φ2: document.getElementById('φ2')?.value, L2: document.getElementById('L2')?.value,
        φ3: document.getElementById('φ3')?.value, L3: document.getElementById('L3')?.value, φ4: document.getElementById('φ4')?.value, L4: document.getElementById('L4')?.value,
        φ17: document.getElementById('φ17')?.value, L17: document.getElementById('L17')?.value, φ18: document.getElementById('φ18')?.value, L18: document.getElementById('L18')?.value,
        φ19: document.getElementById('φ19')?.value, L19: document.getElementById('L19')?.value, φ20: document.getElementById('φ20')?.value, L20: document.getElementById('L20')?.value,
        φ21: document.getElementById('φ21')?.value, C: document.getElementById('C')?.value,
        priceLabTemplate: document.getElementById('priceLabTemplate').value, priceLabRebar: document.getElementById('priceLabRebar').value,
        priceLabConc: document.getElementById('priceLabConc').value, priceLabMasonry: document.getElementById('priceLabMasonry').value,
        priceMatRebar: document.getElementById('priceMatRebar').value, priceMatConc: document.getElementById('priceMatConc').value, priceMatBrick: document.getElementById('priceMatBrick').value,
        priceMachExc: document.getElementById('priceMachExc').value, priceMachTrans: document.getElementById('priceMachTrans').value,
        manageRate: document.getElementById('manageRate').value, profitRate: document.getElementById('profitRate').value, taxRate: document.getElementById('taxRate').value,
      };
      const layers = document.querySelectorAll('#standardLayersContainer .sub-card');
      layers.forEach((card, idx) => {
        const layerIdx = idx + 1;
        const basePhi = 5 + (layerIdx-1)*4;
        base[`φ${basePhi}`] = document.getElementById(`φ${basePhi}`)?.value;
        base[`L${basePhi}`] = document.getElementById(`L${basePhi}`)?.value;
        base[`φ${basePhi+1}`] = document.getElementById(`φ${basePhi+1}`)?.value;
        base[`L${basePhi+1}`] = document.getElementById(`L${basePhi+1}`)?.value;
        base[`φ${basePhi+2}`] = document.getElementById(`φ${basePhi+2}`)?.value;
        base[`L${basePhi+2}`] = document.getElementById(`L${basePhi+2}`)?.value;
        base[`φ${basePhi+3}`] = document.getElementById(`φ${basePhi+3}`)?.value;
        base[`L${basePhi+3}`] = document.getElementById(`L${basePhi+3}`)?.value;
      });
      return base;
    }
    
    function restoreInputs(data){
      if(!data) return;
      if(data.totalFlowH) document.getElementById('totalFlowH').value = data.totalFlowH;
      if(data.H3) document.getElementById('H3').value = data.H3;
      syncH2(); 
      Object.keys(data).forEach(k=>{ 
        const el = document.getElementById(k); 
        if(el) el.value = data[k]; 
      });
    }

    function compute(shouldSave=true){
      syncH2();
      const D_m=D(); const H1_m=parseFloat(document.getElementById('H1').value)||0;
      const A1_m=parseFloat(document.getElementById('A1').value)||0;
      const H2_m=parseFloat(H2_input.value)||0; const A2_m=parseFloat(document.getElementById('A2').value)||0;
      const H3_m=H3(); const A3_m=parseFloat(document.getElementById('A3').value)||0;
      const H4_m=parseFloat(document.getElementById('H4').value)||0; const A4_m=parseFloat(document.getElementById('A4').value)||0;
      const B_m=parseFloat(document.getElementById('B').value)||0;
      const seal_m=parseFloat(document.getElementById('sealThick').value)||0;
      
      const layers = document.querySelectorAll('#standardLayersContainer .sub-card').length;
      const perLayer = H2_m / layers;
      
      const protect_m=config.protect/1000;
      const PI=Math.PI, ceil=Math.ceil;
      const coeff=0.00617;
      
      // 水平筋搭接次数处理
      function horzWt(d, sp, height, diaCircle) {
        if (height <= 0 || d <= 0) return 0;
        const n = ceil(height / sp + 1);
        const circleLen = PI * diaCircle;
        const splicesPerLoop = Math.ceil(circleLen / config.barLength);
        const lapLen = (config.lapFactor * d / 1000);
        const totalLap = splicesPerLoop * lapLen * n;
        return coeff * d * d * (circleLen * n + totalLap);
      }
      
      function vertWt(d, sp, height, diaCircle) {
        if (height <= 0 || d <= 0) return 0;
        const n = ceil(PI * diaCircle / sp);
        return coeff * d * d * (height * n);
      }
      
      function lapWt(d, sp, diaCircle) {
        if (d <= 0) return 0;
        const n = ceil(PI * diaCircle / sp);
        const lapLen = config.lapFactor * d / 1000;
        return coeff * d * d * (lapLen * n);
      }
      
      const diaIn = D_m + 2*protect_m;
      const diaOut1 = D_m + 2*A1_m - 2*protect_m;
      const diaOut2 = D_m + 2*A2_m - 2*protect_m;
      
      let G = 0;
      // 刃脚钢筋
      G += horzWt(parseFloat(document.getElementById('φ1').value), parseFloat(document.getElementById('L1').value)/1000, H1_m, diaIn);
      G += horzWt(parseFloat(document.getElementById('φ2').value), parseFloat(document.getElementById('L2').value)/1000, H1_m, diaOut1);
      G += vertWt(parseFloat(document.getElementById('φ3').value), parseFloat(document.getElementById('L3').value)/1000, H1_m, diaIn);
      G += vertWt(parseFloat(document.getElementById('φ4').value), parseFloat(document.getElementById('L4').value)/1000, H1_m, diaOut1);
      
      // 动态标准段钢筋
      const layerCards = document.querySelectorAll('#standardLayersContainer .sub-card');
      layerCards.forEach((card, idx) => {
        const layerIdx = idx + 1;
        const basePhi = 5 + (layerIdx-1)*4;
        const h_m = perLayer;
        const phi_inner_h = parseFloat(document.getElementById(`φ${basePhi}`)?.value)||0;
        const L_inner_h = parseFloat(document.getElementById(`L${basePhi}`)?.value)/1000||0;
        const phi_outer_h = parseFloat(document.getElementById(`φ${basePhi+1}`)?.value)||0;
        const L_outer_h = parseFloat(document.getElementById(`L${basePhi+1}`)?.value)/1000||0;
        const phi_inner_v = parseFloat(document.getElementById(`φ${basePhi+2}`)?.value)||0;
        const L_inner_v = parseFloat(document.getElementById(`L${basePhi+2}`)?.value)/1000||0;
        const phi_outer_v = parseFloat(document.getElementById(`φ${basePhi+3}`)?.value)||0;
        const L_outer_v = parseFloat(document.getElementById(`L${basePhi+3}`)?.value)/1000||0;
        
        G += horzWt(phi_inner_h, L_inner_h, h_m, diaIn);
        G += horzWt(phi_outer_h, L_outer_h, h_m, diaOut2);
        G += vertWt(phi_inner_v, L_inner_v, h_m, diaIn);
        G += vertWt(phi_outer_v, L_outer_v, h_m, diaOut2);
      });
      
      // 层间纵向搭接 (切记不“双重计算”，仅计入一次搭接量)
      for (let i = 0; i < layerCards.length - 1; i++) {
        const currIdx = i+1;
        const baseCurr = 5 + (currIdx-1)*4;
        const phi_inner_curr = parseFloat(document.getElementById(`φ${baseCurr+2}`)?.value)||0;
        const L_inner_curr = parseFloat(document.getElementById(`L${baseCurr+2}`)?.value)/1000||0;
        const phi_outer_curr = parseFloat(document.getElementById(`φ${baseCurr+3}`)?.value)||0;
        const L_outer_curr = parseFloat(document.getElementById(`L${baseCurr+3}`)?.value)/1000||0;
        
        G += lapWt(phi_inner_curr, L_inner_curr, diaIn);
        G += lapWt(phi_outer_curr, L_outer_curr, diaOut2);
      }
      // 刃脚与第一层纵向搭接 (仅计入一次搭接量)
      G += lapWt(parseFloat(document.getElementById('φ3').value), parseFloat(document.getElementById('L3').value)/1000, diaIn);
      G += lapWt(parseFloat(document.getElementById('φ4').value), parseFloat(document.getElementById('L4').value)/1000, diaOut1);
      
      // 底板与圈梁钢筋 (封底无钢筋)
      const single = config.kLen * D_m;
      G += coeff * (parseFloat(document.getElementById('φ17').value)**2) * single * ceil(D_m / (parseFloat(document.getElementById('L17').value)/1000));
      G += coeff * (parseFloat(document.getElementById('φ18').value)**2) * single * ceil(D_m / (parseFloat(document.getElementById('L18').value)/1000));
      G += coeff * (parseFloat(document.getElementById('φ19').value)**2) * single * ceil(D_m / (parseFloat(document.getElementById('L19').value)/1000));
      G += coeff * (parseFloat(document.getElementById('φ20').value)**2) * single * ceil(D_m / (parseFloat(document.getElementById('L20').value)/1000));
      G += coeff * (parseFloat(document.getElementById('φ21').value)**2) * (parseFloat(document.getElementById('C').value) * PI * (D_m + A4_m));
      
      G *= (1 + config.lossRate / 100);
      
      // 工程量计算开始
      // 模板面积：刃脚、标准段、锁口圈梁（无顶底板、无封底底板、无砖砌体）
      const S = PI*H1_m*(2*D_m+2*A1_m) + PI*H2_m*(2*D_m+2*A2_m) + PI*H4_m*(2*D_m+2*A4_m);
      
      // 混凝土体积：刃脚、标准段、底板、封底、锁口圈梁
      const V = PI*H1_m*A1_m*(D_m+A1_m) + PI*H2_m*A2_m*(D_m+A2_m) + PI*(D_m/2)*(D_m/2)*seal_m + PI*(D_m/2)*(D_m/2)*B_m + PI*H4_m*A4_m*(D_m+A4_m);
      
      // 砖砌体体积计算与块数转换 (灰缝精确按 0.5cm = 0.005m 计算)
      const brickVol = PI*H3_m*A3_m*(D_m+A3_m);
      const unitWithMortar = (config.brick[0] + 0.005) * config.brick[1] * (config.brick[2] + 0.005);
      const Q = Math.ceil(brickVol / unitWithMortar);
      
      // 土方体积：刃脚+标准段+砖砌体高度，直径按刃脚外径 (锁口圈梁在地表以上不计入)
      const Vsoil = PI * ((D_m+2*A1_m)/2) * ((D_m+2*A1_m)/2) * (H1_m + H2_m + H3_m);
      
      const G_ton = G / 1000;
      const labT = parseFloat(document.getElementById('priceLabTemplate').value);
      const labRebar = parseFloat(document.getElementById('priceLabRebar').value);
      const labConc = parseFloat(document.getElementById('priceLabConc').value);
      const labMason = parseFloat(document.getElementById('priceLabMasonry').value);
      const matRebar = parseFloat(document.getElementById('priceMatRebar').value);
      const matConc = parseFloat(document.getElementById('priceMatConc').value);
      const matBrick = parseFloat(document.getElementById('priceMatBrick').value);
      const machExc = parseFloat(document.getElementById('priceMachExc').value);
      const machTrans = parseFloat(document.getElementById('priceMachTrans').value);
      const managePct = parseFloat(document.getElementById('manageRate').value)/100;
      const profitPct = parseFloat(document.getElementById('profitRate').value)/100;
      const taxPct = parseFloat(document.getElementById('taxRate').value)/100;
      
      const labor = S*labT + G_ton*labRebar + V*labConc + Q*labMason;
      const material = G_ton*matRebar + V*matConc + Q*matBrick;
      const machine = Vsoil*machExc + Vsoil*machTrans;
      const costSubtotal = labor + material + machine;
      const manageFee = costSubtotal * managePct;
      const costTotal = costSubtotal + manageFee;
      const profitTotal = costTotal * (1 + profitPct);
      const taxTotal = profitTotal * (1 + taxPct);
      
      const result = { S, G, V, Q, Vsoil, costTotal, profitTotal, taxTotal };
      
      document.getElementById('quantityContainer').innerHTML = `
        <div class="q-item"><span>模板：</span><strong>${S.toFixed(2)} m²</strong></div>
        <div class="q-item"><span>钢筋：</span><strong>${Math.round(G)} kg</strong></div>
        <div class="q-item"><span>混凝土：</span><strong>${V.toFixed(2)} m³</strong></div>
        <div class="q-item"><span>砖砌体：</span><strong>${Q} 块</strong></div>
        <div class="q-item"><span>土方：</span><strong>${Vsoil.toFixed(2)} m³</strong></div>
      `;
      document.getElementById('costDetailContainer').innerHTML = `
        <div style="background:white; border-radius:24px; padding:16px;">
          <div style="font-weight:600;">🧾 成本明细</div>
          <table style="width:100%"><tr><td>👤模板人工</td><td>${(S*labT).toFixed(2)}</td></tr>
          <tr><td>👤钢筋人工</td><td>${(G_ton*labRebar).toFixed(2)}</td></tr>
          <tr><td>👤混凝土人工</td><td>${(V*labConc).toFixed(2)}</td></tr>
          <tr><td>👤砖砌体人工</td><td>${(Q*labMason).toFixed(2)}</td></tr>
          <tr><td>🧤钢筋材料</td><td>${(G_ton*matRebar).toFixed(2)}</td></tr>
          <tr><td>🧤混凝土材料</td><td>${(V*matConc).toFixed(2)}</td></tr>
          <tr><td>🧤砖材料</td><td>${(Q*matBrick).toFixed(2)}</td></tr>
          <tr><td>🚜长臂挖机</td><td>${(Vsoil*machExc).toFixed(2)}</td></tr>
          <tr><td>🚜土方外运</td><td>${(Vsoil*machTrans).toFixed(2)}</td></tr>
          <tr><td>📋管理费</td><td>${manageFee.toFixed(2)}</td></tr>
          <tr style="font-weight:700; color:#1e7e34;"><td>成本合计：</td><td>${costTotal.toFixed(2)}</td></tr>
          </table>
          <div class="price-total-line"><span class="blue-bold">含利润总价: ${profitTotal.toFixed(2)} 元</span></div>
          <div class="price-total-line"><span class="red-large">含税总价: ${taxTotal.toFixed(2)} 元</span></div>
        </div>
      `;

      if (shouldSave) {
        const inputs = captureInputs();
        const record = {
          id: Date.now(),
          label: `${D_m.toFixed(2)}米内径，总深${(H1_m+H2_m+H3_m+H4_m).toFixed(2)}米`,
          timestamp: new Date().toLocaleString(),
          inputs,
          config: {...config},
          results: result,
        };
        saveRecord(record);
        localStorage.setItem(LAST_INPUT_KEY, JSON.stringify({inputs, config}));
      }
      return {inputs: captureInputs(), results: result, config: {...config}};
    }

          <div class="detail-item"><span>材料砖</span><span>${matBrick} 元/块</span></div><div class="detail-item"><span>长臂挖机</span><span>${machExc} 元/m³</span></div>
          <div class="detail-item"><span>土方外运</span><span>${machTrans} 元/m³</span></div>
          <div class="detail-item"><span>管理费率</span><span>${inp.manageRate}%</span></div><div class="detail-item"><span>利润率</span><span>${inp.profitRate}%</span></div>
          <div class="detail-item"><span>税率</span><span>${inp.taxRate}%</span></div>
        </div></div>
        <div class="detail-section"><h4>📊 工程量</h4><div class="detail-grid">
          <div class="detail-item"><span>模板</span><span>${res.S.toFixed(2)} m²</span></div><div class="detail-item"><span>钢筋</span><span>${Math.round(res.G)} kg</span></div>
          <div class="detail-item"><span>混凝土</span><span>${res.V.toFixed(2)} m³</span></div><div class="detail-item"><span>砖砌体</span><span>${res.Q} 块</span></div>
          <div class="detail-item"><span>土方</span><span>${res.Vsoil.toFixed(2)} m³</span></div>
        </div></div>
        <div class="detail-section"><h4>🧾 成本明细</h4><div class="detail-grid">
          <div class="detail-item"><span>模板人工</span><span>${(res.S*labT).toFixed(2)}</span></div><div class="detail-item"><span>钢筋人工</span><span>${(G_ton*labRebar).toFixed(2)}</span></div>
          <div class="detail-item"><span>混凝土人工</span><span>${(res.V*labConc).toFixed(2)}</span></div><div class="detail-item"><span>砖砌体人工</span><span>${(res.Q*labMason).toFixed(2)}</span></div>
          <div class="detail-item"><span>钢筋材料</span><span>${(G_ton*matRebar).toFixed(2)}</span></div><div class="detail-item"><span>混凝土材料</span><span>${(res.V*matConc).toFixed(2)}</span></div>
          <div class="detail-item"><span>砖材料</span><span>${(res.Q*matBrick).toFixed(2)}</span></div>
          <div class="detail-item"><span>长臂挖机</span><span>${(res.Vsoil*machExc).toFixed(2)}</span></div><div class="detail-item"><span>土方外运</span><span>${(res.Vsoil*machTrans).toFixed(2)}</span></div>
          <div class="detail-item"><span>管理费</span><span>${manageFee.toFixed(2)}</span></div>
          <div class="detail-item" style="font-weight:700;color:#1e7e34;"><span>成本合计</span><span>${res.costTotal.toFixed(2)}</span></div>
        </div></div>
        <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px;">
          <div><span class="blue-bold">含利润总价: ${res.profitTotal.toFixed(2)} 元</span></div>
          <div><span class="red-large">含税总价: ${res.taxTotal.toFixed(2)} 元</span></div>
        </div>
      `;
    }

    function renderHistory(){
      const records = loadRecords().reverse();
      const container = document.getElementById('historyList');
      container.innerHTML = records.map((r, idx)=>{
        const inp = r.inputs; const res = r.results; const cfg = r.config;
        const detailHtml = generateRecordDetailHtml(inp, res, cfg);
        return `
        <div class="record-item" data-id="${r.id}" onclick="toggleRecord(this, ${r.id})">
          <div class="record-header">
            <span class="record-index">${records.length - idx}</span>
            <span class="record-title">${r.label} <span style="font-size:0.7rem;color:#557c9a;">${r.timestamp}</span></span>
            <span class="menu-dots" onclick="event.stopPropagation();toggleMenu(${r.id})">⋯</span>
          </div>
          <div class="record-menu" id="menu-${r.id}">
            <div class="menu-item" onclick="event.stopPropagation();renamePrompt(${r.id})">✏️ 重命名</div>
            <div class="menu-item" onclick="event.stopPropagation();deleteRecord(${r.id})">🗑️ 删除</div>
            <div class="menu-item" onclick="event.stopPropagation();copyRecordText(${r.id})">📋 复制全文</div>
          </div>
          <div class="record-detail hidden" id="detail-${r.id}">
            ${detailHtml}
          </div>
        </div>
      `}).join('');
    }

    window.toggleRecord = function(el, id){
      el.classList.toggle('expanded');
      document.getElementById(`detail-${id}`).classList.toggle('hidden');
      closeAllMenus();
    };
    window.toggleMenu = function(id){
      closeAllMenus(id);
      document.getElementById(`menu-${id}`).classList.toggle('show');
      activeMenuId = id;
    };
    function closeAllMenus(except){ document.querySelectorAll('.record-menu').forEach(m=>{ if(m.id!==`menu-${except}`) m.classList.remove('show'); }); }
    window.renamePrompt = function(id){ const newName = prompt('输入新名称', ''); if(newName) renameRecord(id, newName); closeAllMenus(); };
    window.deleteRecord = function(id){ if(confirm('确定删除？')) deleteRecord(id); closeAllMenus(); };
    window.copyRecordText = function(id){
      const rec = loadRecords().find(r=>r.id==id);
      if(!rec) return;
      const text = generateRecordText(rec);
      navigator.clipboard?.writeText(text).then(()=>{
        alert('记录已复制到剪贴板');
      }).catch(()=>{
        prompt('请手动复制以下内容', text);
      });
      closeAllMenus();
    };

    function restoreLast(){
      const last = localStorage.getItem(LAST_INPUT_KEY);
      if(last){
        try{ const {inputs, config: savedCfg} = JSON.parse(last); if(savedCfg) config = savedCfg; restoreInputs(inputs); }catch(e){}
      }
      compute(false);
    }

    const overlay=document.getElementById('settingsOverlay');
    document.getElementById('openSettingsBtn').onclick=()=>{ overlay.classList.add('active'); renderHistory(); };
    document.getElementById('closeSettingsBtn').onclick=()=>{ overlay.classList.remove('active'); lockSettings(); };
    
    function lockSettings(){
      unlocked=false;
      document.getElementById('lockPanel').classList.remove('hidden');
      document.getElementById('settingsContent').classList.add('hidden');
      ['barLength','kLen','protect','lapFactor','brickL','brickW','brickH','lossRate'].forEach(id=> document.getElementById(id).disabled=true);
      document.getElementById('pwdInput').value='';
    }
    function unlockSettings(){
      unlocked=true;
      document.getElementById('lockPanel').classList.add('hidden');
      document.getElementById('settingsContent').classList.remove('hidden');
      ['barLength','kLen','protect','lapFactor','brickL','brickW','brickH','lossRate'].forEach(id=> document.getElementById(id).disabled=false);
      document.getElementById('barLength').value = config.barLength;
      document.getElementById('kLen').value=config.kLen; document.getElementById('protect').value=config.protect;
      document.getElementById('lapFactor').value=config.lapFactor; document.getElementById('brickL').value=config.brick[0];
      document.getElementById('brickW').value=config.brick[1]; document.getElementById('brickH').value=config.brick[2];
      document.getElementById('lossRate').value=config.lossRate;
    }
    document.getElementById('unlockBtn').onclick=()=>{ if(document.getElementById('pwdInput').value==='000000') unlockSettings(); else alert('密码错误'); };
    document.getElementById('applySettingsBtn').onclick=()=>{
      if(!unlocked) return;
      config.barLength = parseFloat(document.getElementById('barLength').value);
      config.kLen=parseFloat(document.getElementById('kLen').value); config.protect=parseFloat(document.getElementById('protect').value);
      config.lapFactor=parseFloat(document.getElementById('lapFactor').value); config.brick=[parseFloat(document.getElementById('brickL').value), parseFloat(document.getElementById('brickW').value), parseFloat(document.getElementById('brickH').value)];
      config.lossRate=parseFloat(document.getElementById('lossRate').value);
      lockSettings(); overlay.classList.remove('active'); compute(true);
    };
    lockSettings();
    
    document.getElementById('calculateBtn').addEventListener('click', ()=>compute(true));
    syncH2(); restoreLast();
  })();
</script>
</body>
</html>
